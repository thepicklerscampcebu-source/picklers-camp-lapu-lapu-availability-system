<!DOCTYPE html>
<html>
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>
    Picklers Camp Availability
  </title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

  <div class="left-panel">

    <div class="calendar">

      <div class="calendar-header">

        <button id="prevMonth">◀</button>

        <h2 id="monthYear"></h2>

        <button id="nextMonth">▶</button>

      </div>

      <div class="weekdays">
        <div>Sun</div>
        <div>Mon</div>
        <div>Tue</div>
        <div>Wed</div>
        <div>Thu</div>
        <div>Fri</div>
        <div>Sat</div>
      </div>

      <div id="calendarDays"></div>

    </div>

  </div>


  <div class="right-panel">

    <h2>Availability</h2>
    
    <div class="schedule-wrapper">
    
      <!-- COURT HEADER (sticky row) -->
      <div class="court-header">
        <div></div>
        <div>Court 1</div>
        <div>Court 2</div>
        <div>Court 3</div>
      </div>
    
      <!-- GRID CONTAINER -->
      <div id="scheduleGrid"></div>
    
    </div>


    <div class="summary">

      <h3>Selected Slot</h3>

      <p id="selectedDate">Date:</p>

      <p id="selectedCourt">Court:</p>

      <p id="selectedTime">Time:</p>

      <p id="selectedDuration">Duration:</p>

      <button type="button">
        BOOK NOW
      </button>

    </div>

  </div>

</div>


<script src="script.js"></script>

</body>
</html>
